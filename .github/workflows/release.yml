name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag and metadata versions
        run: |
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          node - <<'NODE'
          const fs = require("node:fs");
          const tagVersion = process.env.TAG_VERSION;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const registry = JSON.parse(fs.readFileSync("server.json", "utf8"));
          const registryPackage = registry.packages?.[0];
          const failures = [];
          if (pkg.version !== tagVersion) failures.push(`package.json version ${pkg.version} != tag ${tagVersion}`);
          if (registry.version !== tagVersion) failures.push(`server.json version ${registry.version} != tag ${tagVersion}`);
          if (registryPackage?.version !== tagVersion) failures.push(`server.json package version ${registryPackage?.version} != tag ${tagVersion}`);
          if (registryPackage?.identifier !== pkg.name) failures.push(`server.json package identifier ${registryPackage?.identifier} != package name ${pkg.name}`);
          if (failures.length > 0) {
            for (const failure of failures) console.error(`::error::${failure}`);
            process.exit(1);
          }
          console.log(`Version check passed: ${tagVersion}`);
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:unit

      - name: Pack
        run: npm pack --json

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: "*.tgz"

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: dist-package

      - name: Publish package to npm
        run: npm publish dist-package/*.tgz --provenance

  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: publish-npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  github-release:
    name: Create GitHub Release
    needs:
      - publish-npm
      - publish-mcp-registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: dist-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-package/*
          generate_release_notes: true
